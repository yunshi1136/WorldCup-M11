<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界杯M11预测助手</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

h1{
text-align:center;
}

.result{
margin-top:15px;
font-size:18px;
color:#22c55e;
}
</style>
</head>

<body>

<h1>⚽ 世界杯M11预测助手</h1>

<div class="card">
<h3>今日推荐</h3>
<p>德国 VS 库拉索</p>
<button onclick="predict1()">查看预测</button>
<div id="r1" class="result"></div>
</div>

<div class="card">
<h3>今日二串一</h3>
<button onclick="predict2()">查看方案</button>
<div id="r2" class="result"></div>
</div>

<script>

function predict1(){
document.getElementById("r1").innerHTML=
"主胜概率72%<br>推荐：德国胜";
}

function predict2(){
document.getElementById("r2").innerHTML=
"德国胜 + 荷兰不败";
}

</script>

</body>
</html>
